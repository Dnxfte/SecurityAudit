jwt:
  algorithm: "RS256" # RS256 є сучасним і поширеним алгоритмом для JWT, бо використовує асиметричні ключі: приватний для підпису, публічний для перевірки.
  private_key_source: "env:JWT_PRIVATE_KEY" # Приватний ключ зберігається у змінній середовища, а не в коді чи репозиторії, щоб зменшити ризик витоку.
  public_key_source: "env:JWT_PUBLIC_KEY" # Публічний ключ також винесено окремо, щоб перевірку токенів можна було виконувати без доступу до приватного ключа.
  verify_signature: true # Перевірка підпису обов'язкова, інакше зловмисник може підробити JWT.
  allow_only_declared_algorithm: true # Дозволяється лише явно вказаний алгоритм, щоб уникнути атак через підміну алгоритму.
  
  claims:
    exp_required: true # Поле exp є обов'язковим, щоб токен не можна було використовувати безстроково.
    iat_required: true # Поле iat допомагає відстежувати час випуску токена і спрощує контроль його життєвого циклу.
    nbf_required: true # Поле nbf не дозволяє приймати токен раніше визначеного часу.
    aud_check: true # Перевірка aud гарантує, що токен призначений саме для цього API.
    iss_check: true # Перевірка iss дозволяє приймати токени лише від довіреного сервісу автентифікації.
  issuer: "auth.myapp.local" # Фіксоване значення issuer полегшує перевірку джерела токена.
  audience: "api.myapp.local" # Фіксована audience обмежує використання токена лише конкретним застосунком або API.
  access_token_ttl_minutes: 15 # Короткий час життя access token зменшує шкоду у випадку його викрадення.
  refresh_token_ttl_days: 7 # Refresh token живе довше, щоб користувачу не потрібно було часто входити повторно, але строк все одно обмежений.
  clock_skew_seconds: 60 # Невеликий запас часу компенсує розбіжність системного часу між різними серверами.

passwords:
  hash_function: "argon2id" # Argon2id є одним із найкращих сучасних алгоритмів для зберігання паролів, бо добре захищає від brute-force і GPU-атак.
  memory_cost_kib: 65536 # Висока витрата пам'яті ускладнює масовий підбір паролів на спеціалізованому обладнанні.
  time_cost: 3 # Кілька проходів роблять обчислення хешу дорожчим для зловмисника, але ще прийнятним для сервера.
  parallelism: 2 # Помірний рівень паралельності дає баланс між продуктивністю сервера і складністю атаки.
  salt_strategy: "random_per_user" # Унікальна випадкова сіль для кожного користувача захищає від rainbow table та збігів однакових паролів.
  salt_length_bytes: 16 # Довжина солі 16 байт є достатньою для безпечної генерації унікальних значень.
  pepper_source: "env:PASSWORD_PEPPER" # Pepper зберігається окремо від бази даних, тому компрометація БД не дає зловмиснику всі дані для перевірки паролів.
  min_length: 12 # Мінімальна довжина 12 символів суттєво підвищує стійкість пароля до перебору.
  require_uppercase: true # Вимога великих літер збільшує різноманітність символів у паролі.
  require_lowercase: true # Вимога малих літер допомагає формувати складніші комбінації.
  require_digits: true # Наявність цифр підвищує ентропію пароля.
  require_special_chars: true # Спеціальні символи ускладнюють підбір пароля словниковими атаками.

encryption:
  algorithm: "AES-256-GCM" # AES-256-GCM є сучасним стандартом симетричного шифрування, бо забезпечує і конфіденційність, і контроль цілісності даних.
  key_source: "env:DATA_ENCRYPTION_KEY" # Ключ шифрування береться зі змінної середовища або секретного сховища, а не зберігається у відкритому вигляді.
  use_authenticated_encryption: true # Автентифіковане шифрування дозволяє виявити зміну зашифрованих даних.
  nonce_strategy: "random_per_operation" # Для кожної операції використовується новий випадковий nonce, щоб не повторювати параметри шифрування.
  nonce_length_bytes: 12 # Для GCM рекомендованим є nonce довжиною 12 байт, бо це стандартний і безпечний варіант.
  auth_tag_length_bytes: 16 # Тег автентичності 16 байт дає надійну перевірку цілісності та справжності зашифрованих даних.
  key_rotation_enabled: true # Ротація ключів зменшує ризик довгого використання одного й того самого ключа.
  key_rotation_days: 90 # Регулярна ротація раз на 90 днів є хорошою практикою для довготривалого захисту даних.